# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main", "master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject runtime config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://diusqgphvybnzazgopor.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          supabase_url = os.environ.get("SUPABASE_URL", "").strip() or "https://diusqgphvybnzazgopor.supabase.co"
          supabase_anon_key = os.environ.get("SUPABASE_ANON_KEY", "").strip()
          if not supabase_url:
              print("::error::GitHub Secret SUPABASE_URL is missing")
              sys.exit(1)
          if not supabase_anon_key:
              print("::error::GitHub Secret SUPABASE_ANON_KEY is missing")
              sys.exit(1)

          target = Path("chat AI/cancri_chat_ui_v_3.html")
          html = target.read_text(encoding="utf-8")
          html, url_count = re.subn(
              r"window\.__SUPABASE_URL__\s*=\s*[^;]+;",
              f"window.__SUPABASE_URL__ = {json.dumps(supabase_url)};",
              html,
              count=1,
          )
          html, key_count = re.subn(
              r"window\.__SUPABASE_ANON_KEY__\s*=\s*[^;]+;",
              f"window.__SUPABASE_ANON_KEY__ = {json.dumps(supabase_anon_key)};",
              html,
              count=1,
          )
          if url_count != 1:
              print("::error::SUPABASE_URL assignment was not replaced")
              sys.exit(1)
          if key_count != 1:
              print("::error::SUPABASE_ANON_KEY assignment was not replaced")
              sys.exit(1)
          target.write_text(html, encoding="utf-8")
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build Pages artifact
        run: |
          set -euo pipefail
          rm -rf pages-dist
          mkdir -p pages-dist/css pages-dist/js "pages-dist/chat AI"

          cp -a index.html about.html article.html pages-dist/
          cp -a Logo pages-dist/Logo
          find css -maxdepth 1 -type f -print0 | xargs -0 -I{} cp "{}" pages-dist/css/
          cp -a js/. pages-dist/js/

          python - <<'PY'
          from pathlib import Path
          import shutil

          src = Path("chat AI")
          dst = Path("pages-dist/chat AI")
          for name in [
              "cancri_chat_ui_v_3.html",
              "cancri_chat.css",
              "cancri_chat.js",
              "cancri_announcement.js",
              "cancri_arena.css",
              "cancri_arena.js",
          ]:
              shutil.copy2(src / name, dst / name)
          for svg in src.glob("*.svg"):
              shutil.copy2(svg, dst / svg.name)
          katex = src / "katex"
          if katex.exists():
              shutil.copytree(katex, dst / "katex", dirs_exist_ok=True)
          PY

          if grep -R -n -E 'PROXY_AUTH_TOKEN|__PROXY_TOKEN__|x-proxy-token|modelscope-proxy|chat-history|web-search' pages-dist; then
            echo "::error::Pages artifact contains backend route/provider material"
            exit 1
          fi
          if grep -R -n -E 'dashscope|modelscope|siliconflow|pingUrl|线路|供应商|官方API' "pages-dist/chat AI"; then
            echo "::error::ChatAI frontend contains route/provider material"
            exit 1
          fi
          if find pages-dist \( -path '*/supabase/*' -o -path '*/后端/*' -o -path '*/备份/*' -o -path '*/.github/*' -o -path '*/supabase-cli/*' \) -print -quit | grep -q .; then
            echo "::error::Pages artifact contains private deployment or backup paths"
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
