# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject runtime config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://diusqgphvybnzazgopor.supabase.co' }}
          PROXY_AUTH_TOKEN: ${{ secrets.PROXY_AUTH_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          supabase_url = os.environ.get("SUPABASE_URL", "").strip() or "https://diusqgphvybnzazgopor.supabase.co"
          proxy_token = os.environ.get("PROXY_AUTH_TOKEN", "").strip()
          if not supabase_url:
              print("::error::GitHub Secret SUPABASE_URL is missing")
              sys.exit(1)

          target = Path("chat AI/cancri_chat_ui_v_3.html")
          html = target.read_text(encoding="utf-8")
          html = html.replace(
              "window.__SUPABASE_URL__ = window.__SUPABASE_URL__ || '';",
              f"window.__SUPABASE_URL__ = {json.dumps(supabase_url)};",
          )
          html = html.replace(
              "window.__SUPABASE_URL__ = window.__SUPABASE_URL__ || 'https://diusqgphvybnzazgopor.supabase.co';",
              f"window.__SUPABASE_URL__ = {json.dumps(supabase_url)};",
          )
          html = html.replace(
              "window.__PROXY_TOKEN__ = window.__PROXY_TOKEN__ || '';",
              f"window.__PROXY_TOKEN__ = {json.dumps(proxy_token)};",
          )
          if "window.__SUPABASE_URL__ = window.__SUPABASE_URL__ || '';" in html:
              print("::error::SUPABASE_URL placeholder was not replaced")
              sys.exit(1)
          if "window.__PROXY_TOKEN__ = window.__PROXY_TOKEN__ || '';" in html:
              print("::error::PROXY_TOKEN placeholder was not replaced")
              sys.exit(1)
          target.write_text(html, encoding="utf-8")
          PY
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
