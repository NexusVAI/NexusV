    <style>
        .about-page {
            max-width: 1440px;
            margin: 0 auto;
            padding: 120px 24px 60px;
            box-sizing: border-box;
        }

        .about-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .about-category {
            font-size: 14px;
            font-weight: 500;
            color: var(--secondary-text);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .about-title {
            font-size: 64px;
            font-weight: 500;
            color: var(--text-color);
            margin: 0 0 24px 0;
            letter-spacing: -0.02em;
        }

        .about-subtitle {
            font-size: 20px;
            font-weight: 400;
            color: var(--secondary-text);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
            margin-bottom: 100px;
        }

        .about-text {
            padding-right: 40px;
        }

        .about-text h2 {
            font-size: 32px;
            font-weight: 500;
            color: var(--text-color);
            margin: 0 0 24px 0;
            letter-spacing: -0.01em;
        }

        .about-text p {
            font-size: 16px;
            line-height: 1.7;
            color: var(--secondary-text);
            margin: 0 0 20px 0;
        }

        .about-image {
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--bg-card);
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .about-buttons {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        .about-btn-primary {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: 1px solid var(--text-color);
            border-radius: 100px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .about-btn-primary:hover {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
        }

        .about-btn-secondary {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .about-btn-secondary:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
            border-color: var(--text-color);
        }

        .about-btn-primary span, .about-btn-secondary span {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 1024px) {
            .about-content {
                grid-template-columns: 1fr;
                gap: 48px;
            }

            .about-text {
                padding-right: 0;
            }

            .about-title {
                font-size: 48px;
            }
        }

        @media (max-width: 768px) {
            .about-page {
                padding: 100px 16px 40px;
            }

            .about-title {
                font-size: 36px;
            }

            .about-subtitle {
                font-size: 18px;
            }

            .about-text h2 {
                font-size: 28px;
            }

            .about-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
