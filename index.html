<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusV</title>
    <meta name="description" content="NexusV - 前沿游戏模组制作工作室，打造最具沉浸感的开放世界交互体验。">
    <meta name="keywords" content="NexusV,SentienceV4,游戏模组,开放世界,AI">

    <meta property="og:image" content="Logo/NNNEE.png">
    <meta name="twitter:card" content="summary_large_image">
    <script>
        (() => {
            let theme = 'warm';
            try { theme = localStorage.getItem('theme') || 'warm'; } catch (e) {}
            if (theme === 'light') document.documentElement.classList.add('light-theme');
            if (theme === 'warm') document.documentElement.classList.add('warm-theme');
        })();
    </script>
    <link rel="icon" type="image/png" href="Logo/Cancri.png">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/mobile-menu.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/news.css">
    <link rel="stylesheet" href="css/cta.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/article.css">
    <link rel="stylesheet" href="css/comments.css">
    <link rel="stylesheet" href="css/wenjuan.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha384-/o6I2CkkWC//PSjvWC/eYN7l3xM3tJm8ZzVkCOfp//W05QcE3mlGskpoHB6XqI+B" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="css/inter-fonts.css">
</head>
<body>
    <!-- Shared components injected by components.js -->

    <main class="main-container">
        <div class="content-grid">
            
            <!-- 左侧大卡片 (Sticky) -->
            <div class="left-column sticky-container">
                <a href="article.html?id=sentienceV4ob" class="card-link hero-card" id="hero">
                    <div class="image-wrapper hero-image lazy-video-wrapper">
                        <img src="Logo/NNNEE.png" alt="Video Preview" class="video-poster" onerror="this.onerror=null;this.src='Logo/I2.webp'" style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2;">
                        <video loop muted playsinline class="hero-video" data-src="Logo/意识V4o.webm" data-fallback="Logo/NNNEE.png" preload="none" style="width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 1; opacity: 0;">
                        </video>
                        <h2 class="hero-overlay-text" data-i18n="hero.overlay" style="z-index: 3;">Sentience V4 Omni</h2>
                    </div>
                    <div class="card-text">
                        <h3 class="card-title" data-i18n="hero.title">SentienceV4 Omni Beta震撼登场</h3>
                        <p class="card-meta"><span>产品</span> <span class="meta-time">12分钟阅读</span></p>
                    </div>
                </a>
            </div>

            <!-- 右侧新闻列表 (可滚动) -->
            <div class="right-column scrollable-list">
                <!-- Populated by JS -->
            </div>
        </div>
        
        <!-- 最新消息网格 -->
        <div class="latest-news-section" id="latest-news">
            <div class="section-header">
                <h2 class="section-title" data-i18n="news.latest">最新动态</h2>
                <a href="#latest-news" class="view-all-link" data-i18n="news.view_more">查看更多</a>
            </div>
            <div class="news-grid-2-col">
                <!-- Populated by JS -->
            </div>
        </div>
    </main>

    <!-- CTA 区域 -->
    <section class="cta-section">
        <h2 data-i18n="cta.title">开始使用 Nexus V</h2>
        <a href="https://www.wanjiadongli.com/user/1753255?tab=2" class="cta-btn" data-i18n="cta.btn">立即体验 ↗</a>
    </section>

    <div data-page-footer></div>
    <div data-page-comments></div>

    <script src="js/components.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/menu.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/comments.js" defer></script>
    <script>document.addEventListener('DOMContentLoaded',function(){injectComponents({commentsPageId:'index',commentsPageUrl:'https://nexusv.github.io/index.html',commentsPageTitle:'NexusV - 首页'});});</script>
<!-- Wenjuan Layer Begin -->
    <div id="wenjuan-float" class="wenjuan-float">
        <a href="https://wj.qq.com/s2/26383769/f1c0/" target="_blank">问卷调查</a>
    </div>
    <!-- Wenjuan Layer End -->
</body>
</html>
