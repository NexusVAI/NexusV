<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 申请 - Cancri</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 32px; max-width: 480px; width: 90%; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    input, textarea { width: 100%; padding: 10px 12px; background: #111; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none; }
    input:focus, textarea:focus { border-color: #555; }
    textarea { resize: vertical; min-height: 80px; }
    button { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #333; cursor: not-allowed; }
    .msg { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-top: 12px; display: none; }
    .msg.ok { background: #0a2e0a; border: 1px solid #166534; color: #4ade80; }
    .msg.err { background: #2e0a0a; border: 1px solid #651616; color: #f87171; }
    .login-hint { text-align: center; margin-top: 16px; }
    .login-hint a { color: #60a5fa; text-decoration: none; }
    .status-box { background: #111; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .status-pending { background: #854d0e; color: #fbbf24; }
    .status-approved { background: #166534; color: #4ade80; }
    .status-rejected { background: #651616; color: #f87171; }
    .btn-secondary { background: #333; margin-top: 12px; }
    .btn-secondary:hover { background: #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>API 申请</h1>
    <p class="subtitle">申请 Cancri API Key，用于调用大模型接口</p>

    <div id="loading" style="text-align:center;padding:20px;color:#888">加载中...</div>

    <div id="login-section" style="display:none">
      <p style="margin-bottom:12px">请先登录后再申请 API Key。</p>
      <button onclick="location.href='./cancri_chat_ui_v_3.html'">前往登录</button>
    </div>

    <div id="apply-section" style="display:none">
      <div id="existing-status" style="display:none"></div>
      <div id="apply-form">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="email" readonly>
        </div>
        <div class="form-group">
          <label>用途说明</label>
          <textarea id="purpose" placeholder="简要描述你的使用场景，例如：个人项目开发、学术研究、企业集成等"></textarea>
        </div>
        <button id="submit-btn" onclick="submitApplication()">提交申请</button>
        <div class="msg" id="msg"></div>
      </div>
    </div>

    <div id="key-section" style="display:none">
      <p style="margin-bottom:12px; color:#4ade80">你的申请已通过！可以生成 API Key 了。</p>
      <button onclick="location.href='./api_keys.html'">管理 API Keys</button>
    </div>

    <button class="btn-secondary" onclick="location.href='./cancri_chat_ui_v_3.html'" style="width:100%;padding:10px;background:#333;color:#aaa;border:none;border-radius:8px;font-size:13px;cursor:pointer;margin-top:16px">返回聊天</button>
  </div>

  <script src="./cancri_config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const sb = window.supabase.createClient(window.__SUPABASE_URL__, window.__SUPABASE_ANON_KEY__);
    const GW = window.__SUPABASE_URL__ + '/functions/v1/chat-gateway';
    let currentUser = null;

    async function init() {
      const { data: { user } } = await sb.auth.getUser();
      document.getElementById('loading').style.display = 'none';
      if (!user || user.is_anonymous) {
        document.getElementById('login-section').style.display = 'block';
        return;
      }
      currentUser = user;
      document.getElementById('email').value = user.email || '';
      document.getElementById('apply-section').style.display = 'block';
      await checkExisting();
    }

    async function checkExisting() {
      try {
        const { data: { session } } = await sb.auth.getSession();
        const resp = await fetch(GW, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
          body: JSON.stringify({ endpoint: 'api_my_keys' })
        });
        const data = await resp.json();
        if (data.applications && data.applications.length > 0) {
          const app = data.applications[0];
          const box = document.getElementById('existing-status');
          box.style.display = 'block';
          const badgeClass = 'status-' + app.status;
          const statusText = { pending: '审核中', approved: '已通过', rejected: '已拒绝' }[app.status] || app.status;
          box.innerHTML = '<div class="status-box"><div>申请状态：<span class="status-badge ' + badgeClass + '">' + statusText + '</span></div><div style="color:#666;font-size:12px;margin-top:6px">申请时间：' + new Date(app.created_at).toLocaleString('zh-CN') + '</div></div>';
          document.getElementById('apply-form').style.display = 'none';
          if (app.status === 'approved') {
            document.getElementById('key-section').style.display = 'block';
          }
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function submitApplication() {
      const purpose = document.getElementById('purpose').value.trim();
      if (!purpose) { showMsg('请填写用途说明', true); return; }
      const btn = document.getElementById('submit-btn');
      btn.disabled = true; btn.textContent = '提交中...';
      try {
        const { data: { session } } = await sb.auth.getSession();
        const resp = await fetch(GW, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
          body: JSON.stringify({ endpoint: 'api_apply', purpose })
        });
        const data = await resp.json();
        if (resp.ok) {
          showMsg('申请已提交，请等待审核。', false);
          setTimeout(() => checkExisting(), 1000);
        } else {
          showMsg(data.error || '提交失败', true);
        }
      } catch (e) {
        showMsg('网络错误', true);
      }
      btn.disabled = false; btn.textContent = '提交申请';
    }

    function showMsg(text, isErr) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + (isErr ? 'err' : 'ok');
      el.style.display = 'block';
    }

    init();
  </script>
</body>
</html>
