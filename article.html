<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusV</title>
    <meta name="description" content="NexusV 文章 - 前沿游戏模组制作工作室技术文章与动态。">
    <meta name="keywords" content="NexusV,SentienceV4,游戏模组,技术文章">
    <meta property="og:title" content="NexusV">
    <meta property="og:description" content="NexusV 文章 - 前沿游戏模组制作工作室技术文章与动态。">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://nexusv.github.io/article.html">
    <meta property="og:image" content="Logo/NNNEE.png">
    <meta name="twitter:card" content="summary_large_image">
    <script>
        (() => {
            let theme = 'warm';
            try { theme = localStorage.getItem('theme') || 'warm'; } catch (e) {}
            if (theme === 'light') document.documentElement.classList.add('light-theme');
            if (theme === 'warm') document.documentElement.classList.add('warm-theme');
            if (theme === 'blue') document.documentElement.classList.add('blue-theme');
        })();
    </script>
    <link rel="icon" type="image/png" href="Logo/Cancri.png">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/mobile-menu.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/news.css">
    <link rel="stylesheet" href="css/cta.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/article.css">
    <link rel="stylesheet" href="css/charts.css">
    <link rel="stylesheet" href="css/comments.css">
    <link rel="stylesheet" href="css/inter-fonts.css">
</head>
<body>
    <!-- Shared components injected by components.js -->

    <!-- 图表放大模态框 -->
    <div class="chart-modal" id="chartModal">
        <div class="chart-modal-content">
            <button class="chart-modal-close" onclick="closeChartModal()">&times;</button>
            <canvas id="modalChart"></canvas>
        </div>
    </div>

    <main class="article-main article-page">
        <div class="article-wrap">
            <div class="article-top-meta">
                <span class="article-date"></span>
                <span class="article-category"></span>
            </div>
            <h1 class="article-title"></h1>
            <div class="article-rule"></div>
            <div class="article-meta-row">
                <div class="meta-right">
                    <button class="share-link-btn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        <span data-i18n="article.share">分享</span>
                    </button>
                </div>
            </div>
            
            <div class="article-body"></div>

            <div class="article-author-box">
                <div class="author-pill">2026 年</div>
                <div class="author-info">
                    <span class="label" data-i18n="article.author">作者</span>
                    <a href="about.html" class="author-link">NexusV</a>
                </div>
            </div>
        </div>

        <section class="article-quote-switcher" data-quote-switcher hidden>
            <div class="quote-switcher-tabs" role="tablist" aria-label="玩家体验切换">
                <button class="quote-switcher-tab active" type="button" role="tab" aria-selected="true" data-quote-tab="0"></button>
                <button class="quote-switcher-tab" type="button" role="tab" aria-selected="false" data-quote-tab="1"></button>
            </div>
            <blockquote class="quote-switcher-text"></blockquote>
        </section>

        <div class="continue-reading-section">
            <div class="cr-header">
                <h3 data-i18n="article.continue_reading">继续阅读</h3>
                <a href="index.html#latest-news" data-i18n="article.view_all">查看全部</a>
            </div>
            <div class="cr-grid">
                <!-- Populated by JS -->
            </div>
        </div>

    </main>

    <div data-page-footer></div>


    <div data-page-comments></div>

    <script src="js/components.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/theme.js" defer></script>
    <script src="js/menu.js" defer></script>
    <script src="js/article.js" defer></script>
    <script src="js/charts.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/comments.js" defer></script>
    <script>document.addEventListener('DOMContentLoaded',function(){
        var p=new URLSearchParams(window.location.search);
        var aid=p.get('id')||'article';
        injectComponents({commentsPageId:aid,commentsPageUrl:window.location.href,commentsPageTitle:document.title});
        setTimeout(function(){
            var t=document.querySelector('.article-title');
            var c=document.getElementById('cusdis_thread');
            if(t&&t.textContent&&c)c.setAttribute('data-page-title',t.textContent+' | NexusV');
        },500);
    });</script>
</body>
</html>
